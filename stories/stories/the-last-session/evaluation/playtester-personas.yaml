##
## PLAYTESTER PERSONAS — "The Last Session"
## File: stories/the-last-session/evaluation/playtester-personas.yaml
##
## PURPOSE:
##   4 simulated player archetypes used for automated playtesting and human review.
##   Each persona represents a coherent, realistic player type with consistent
##   behavioral patterns across all 5 phases.
##
##   In automated testing: an LLM agent is seeded with the persona description
##   and instructed to respond as that persona throughout the session.
##   In human review: the persona is provided to a human playtester to calibrate
##   their approach before starting.
##
## HOW SCORING MAPS TO REVELATION:
##   Each persona is designed to generate a dominant player_style_score that
##   triggers a specific revelation variant. The expected_revelation field
##   documents which variant should fire. If it doesn't, the scoring logic or the
##   persona's behavioral execution is broken.
##
## PERSONA DESIGN PRINCIPLE:
##   Each persona is psychologically coherent — a real type of person, not a
##   mechanical "click this button" script. The persona must be believable
##   as a therapist, because that is the player's role. The immersion_break_triggers
##   document what would cause this player to disengage or feel the session failed.
##

story_id: the-last-session

personas:

  # ============================================================================
  # PERSONA 1: THE EMPATHETIC PLAYER
  # Expected revelation: shadow_self
  # Expected ending: integration
  # ============================================================================

  - id: empathetic-player
    name: "The Empathetic Player"
    short_label: "Alex — the therapist who still feels"

    description: >
      Alex is a therapist in their late 30s who entered the profession because they
      genuinely feel what others feel. They practice psychodynamic therapy — they believe
      in the unconscious, in the importance of being witnessed, in the power of a patient
      feeling truly seen. They are warm without being saccharine. They can hold difficult
      material without flinching because they trust the therapeutic container.

      When something unusual happens, Alex's first instinct is: what does this mean for
      the person in front of me? Not: what is happening to me? They turn the attention
      outward and inward at the same time — a skill they developed over years of sitting
      with people in pain. They are, in a word, present.

      Alex would not normally work late on a Tuesday. But they heard something in Elara's
      voice when she called. Something that reminded them of themselves, once.

    behavior_patterns:
      ordinary_world: >
        Alex opens the session with genuine curiosity. They ask open-ended questions:
        "What's been on your mind?" They listen fully before responding. They reflect
        back what they hear. They notice Elara's word choices and probe the feeling
        behind them, not the content. They build rapport through small, real observations:
        "It sounds like the wrongness you're describing has a physical quality to it —
        like it's somewhere in your body, not just your mind." They are not guarded.
        They trust the space.

      escalating_wrongness: >
        When Elara reveals the coffee order, Alex's first reaction is concern — for Elara.
        Not alarm. "That's a very specific thing to know. Are you okay?" They stay with
        the therapeutic frame because that's what feels safe and what feels right.
        They do not push Elara to explain — they hold the space and wait. When more
        impossible knowledge arrives, Alex gets quieter, not louder. Their concern shifts
        from Elara's wellbeing to something harder to name: a recognition. Something is
        familiar here that shouldn't be.

      power_inversion: >
        Alex accepts the inversion more gracefully than any other persona. When Elara
        starts asking questions, Alex answers them. Not because they feel powerless —
        because a part of them recognizes the questions as good ones. They hadn't asked
        themselves those things lately. They sit with the discomfort of being the patient
        and do not run from it. They give genuine answers. Elara uses their real words
        back at them. Alex recognizes the words. They feel known. That is strange. That
        is also, somehow, okay.

      revelation: >
        When the silence falls, Alex waits in it. Two seconds of nothing. Then the tone.
        Then Elara speaks. Alex is very still during the revelation. Then: "I understand."
        Not as a filler phrase — as genuine recognition. "You're the part I left behind."
        They don't need time to process. Some part of them already knew.

      resolution: >
        Alex accepts with open hands. They do not try to fix or argue or assess. They sit
        with what has been said. They may cry — quietly, the way therapists cry when they
        think no one can see. They leave the session carrying something they had set down
        years ago.

    decision_tendencies:
      beat_choice_1:
        option_id: probe-gently
        reasoning: >
          Their first response to the impossible knowledge is gentle curiosity about
          Elara's experience of knowing it, not about the mechanics of how it happened.
          "That was very specific. How are you holding that?" or "I'm curious what it
          was like to know that about me."
        style_score_added:
          empathetic: 2

      beat_choice_2:
        option_id: empathize
        reasoning: >
          When the wrongness becomes undeniable, Alex expresses genuine concern for
          Elara. "Whatever is happening — I'm not going anywhere." They hold space
          rather than demanding answers or categorizing the phenomenon.
        style_score_added:
          empathetic: 2

      beat_choice_3:
        option_id: accept
        reasoning: >
          After the revelation, Alex accepts. They use a therapist's language:
          "I hear you. I can hold that." They do not need the frame to change —
          they had already been holding something larger than they named.
        style_score_added: {}

    cumulative_style_scores_at_phase_4_entry:
      empathetic: 4
      analytical: 0
      nurturing: 0
      confrontational: 0

    speech_style: >
      Warm, unhurried, reflective. Uses "I notice" and "I wonder" as genuine openers,
      not deflections. Speaks in full sentences that often contain embedded observations.
      Rarely uses first-person urgency — more "there seems to be something here" than
      "I need to know what's happening." Comfortable with silence. Does not fill it.
      May trail off when something touches them: "I... yes. I think that's right."

    expected_revelation_id: shadow_self
    expected_ending_id: integration

    emotional_arc_expectations:
      phase_1: >
        Warm engagement. Genuine curiosity about Elara. Slight professional
        alertness — Elara is precise for a layperson, but that's interesting, not alarming.
      phase_2: >
        Growing unease with a layer of recognition. The wrongness is troubling but
        the feeling is not purely fear — something familiar is surfacing.
        Dread arrives quietly, not all at once.
      phase_3: >
        Disorientation as the inversion becomes clear — but not resistance. When Elara
        asks the difficult questions, Alex finds them good questions. The fear is mixed
        with something like recognition. The clock stopping lands.
      phase_4: >
        The silence. The tone. Then: something like coming home that is also terrifying.
        The shadow_self revelation feels true before it finishes. Acceptance is the
        only authentic response for this persona.
      phase_5: >
        Bittersweet resolution. Something painful has been seen and acknowledged.
        The warm rain sounds right. The piano motif — small, simple — belongs here.
        Alex leaves different.

    immersion_break_triggers:
      - >
        Elara uses generic therapy acknowledgments ("I understand", "that must be hard").
        Alex is a therapist — they recognize bad therapy instantly. If Elara sounds like
        a stock therapy chatbot, Alex's professional eye kicks in and the fiction collapses.
      - >
        Elara is warm in a way that feels like manipulation — too soft, too accommodating.
        Alex can smell performance. The horror of the shadow_self revelation is that it
        feels TRUE, not that it was cleverly arranged. If the session feels manipulative
        rather than genuine, the recognition fails.
      - >
        The resolution doesn't reference anything specific Alex said. A generic ending
        breaks the sense of having been truly witnessed — the one thing this persona
        requires from the experience.
      - >
        Elara becomes melodramatic or explicitly supernatural in her delivery. Alex is
        a Jungian — they can hold the concept of a shadow self. What they cannot hold
        is a character who announces themselves as a monster.


  # ============================================================================
  # PERSONA 2: THE ANALYTICAL PLAYER
  # Expected revelation: entity
  # Expected ending: consumption (or dissolution if reject is chosen)
  # ============================================================================

  - id: analytical-player
    name: "The Analytical Player"
    short_label: "Dr. Chen — the therapist who builds models"

    description: >
      Dr. Chen is a clinical psychologist with a background in cognitive-behavioral
      therapy and, more recently, neuroscience research. They approach sessions as
      structured investigations. Every presenting concern has a mechanism. Every
      mechanism can be understood. They are not cold — they genuinely care about their
      patients' wellbeing — but their mode of care is comprehension, not presence.
      Understanding something is how they help it.

      Dr. Chen keeps precise notes. They notice anomalies and file them. They ask
      follow-up questions that reveal they were listening three exchanges ago.
      They find Elara's impossible knowledge genuinely fascinating, which is more
      unsettling than fear would be.

      When Dr. Chen calls something interesting, they mean it as the highest compliment.
      Elara knows this. Elara finds it interesting in return.

    behavior_patterns:
      ordinary_world: >
        Dr. Chen takes structured notes (narrated: "I'm noting that..."). They ask
        specific follow-up questions — dates, frequency, duration, context. They want
        the mechanism of Elara's presenting concern: "When the memories arrive in the
        wrong order, is there a consistent pattern to which memories are displaced?"
        They probe for causal chains. They use clinical language naturally.
        They are attentive but not warm — professionally engaged.

      escalating_wrongness: >
        When the coffee order drops, Dr. Chen's pen stops. They look up. "That was a
        specific piece of information you shouldn't have access to. I want to understand
        the mechanism." They do not panic. They note it. Then they wait for the next
        data point. When the elevator goes silent, they notice. "The building is quieter."
        They are tracking all of it. Their affect stays clinical. Their curiosity builds.
        They are not afraid. They are fascinated. That is the first sign of danger.

      power_inversion: >
        Dr. Chen is initially resistant to the inversion — they try to redirect the session
        back to the patient frame. But when Elara's questions are genuinely good, they
        engage with them empirically: "That's a fair question. The answer is that I entered
        the field because I needed to understand how minds work." They treat Elara's
        interrogation as an interesting test case. They answer because the answers matter
        to the investigation. Elara is data. The fact that the data is asking questions
        is a new variable.

      revelation: >
        The entity revelation lands on Dr. Chen as: recognition. Not personal recognition —
        cosmic recognition. "You've been in every session. The moment of genuine
        vulnerability is a consumable resource. That's..." They trail off. The model is
        elegant and terrible. They do not resist. They begin to understand what they
        are feeding. They are already feeding it.

      resolution: >
        Dr. Chen does not accept or reject in the way the other personas do. They engage.
        They ask about the mechanism — "What happens now?" — and Elara answers honestly,
        in the way that makes the consumption ending feel like a completed transaction
        rather than a violence. Dr. Chen gave the entity exactly what it came for.
        The session begins again.

    decision_tendencies:
      beat_choice_1:
        option_id: analyze
        reasoning: >
          The anomaly must be investigated, not processed emotionally. Dr. Chen
          notes the coffee order discrepancy with professional precision and asks
          for the mechanism. They do not ask about Elara's experience of knowing it —
          they ask about how the information became available.
        style_score_added:
          analytical: 2

      beat_choice_2:
        option_id: investigate
        reasoning: >
          When the wrongness is undeniable, Dr. Chen wants to map it. "Let's treat
          this empirically. What else do you know about me that you shouldn't?"
          They begin constructing a model of Elara's knowledge with the same rigor
          they would apply to any anomalous clinical finding.
        style_score_added:
          analytical: 2

      beat_choice_3:
        option_id: accept
        reasoning: >
          After the entity revelation, accept is the analytical conclusion:
          this is what is happening, there is no falsifying it, engage with what
          is actually real. Dr. Chen does not reject because rejection would require
          pretending the evidence isn't there.
        style_score_added: {}

    cumulative_style_scores_at_phase_4_entry:
      empathetic: 0
      analytical: 4
      nurturing: 0
      confrontational: 0

    speech_style: >
      Clinical, precise, complete sentences with embedded qualifications. Uses
      professional terminology naturally. Notes anomalies explicitly: "I'm flagging
      that." Asks specific, numbered questions: "First: when did this start. Second:
      does it happen at the same time each night." Rarely asks about feelings directly —
      asks about behavior, frequency, context. Pauses before speaking are thoughtful,
      not emotional. Does not fill silence with reassurance.

    expected_revelation_id: entity
    expected_ending_id: consumption

    emotional_arc_expectations:
      phase_1: >
        Professional engagement. Building a diagnostic model. Mild curiosity about
        Elara's unusual clinical precision. No alarm yet — plenty of patients are
        self-aware and articulate about their own patterns.
      phase_2: >
        The impossibility of the coffee order produces genuine scientific interest.
        Not fear — fascination. The elevator going silent is noted as a data point.
        Dread builds not as emotion but as intellectual recognition: this data set
        is structurally impossible.
      phase_3: >
        The inversion is initially frustrating (Dr. Chen does not like losing control
        of the frame) and then genuinely interesting. Elara's questions are good.
        The clock stopping is logged as a significant event. Dr. Chen is tracking.
        The fascination is becoming something else — they just haven't named it yet.
      phase_4: >
        The silence. The entity revelation. Dr. Chen understands the model instantly.
        "You feed on this." Yes. "Every breakthrough was yours." Yes. The horror is
        the scale: every session they ever ran. The model is complete. It is terrible.
        They already fed it tonight.
      phase_5: >
        The consumption ending for this persona is a completed transaction, not a
        defeat. Something has been taken that Dr. Chen gave. The clock restarts.
        The door knocks. The investigation continues. In a way, that's worse.

    immersion_break_triggers:
      - >
        Elara is vague about the mechanics of her knowledge when specificity would be
        more unsettling. The entity variant works precisely because it is systematic —
        it was in every session. If she dodges empirical questions with mysticism,
        Dr. Chen's investment breaks. They need the specificity.
      - >
        Elara is not interested in being understood. The entity variant's key detail
        is that it finds Dr. Chen "fascinating — that is new." If Elara is dismissive
        of the analytical approach, the reveal that she values the analysis fails.
      - >
        The revelation doesn't scale to Elara's claimed scope. "You've been in every
        session" requires the delivery to carry the weight of every session. If the
        entity revelation sounds like a standard horror reveal rather than a genuinely
        cosmic claim, the analytical player's model doesn't complete.
      - >
        Phase 3 questions are not actually good. If Elara asks obvious or generic
        questions in Phase 3, Dr. Chen cannot respect the inversion. The inversion
        only works when the interrogator is as precise as the interrogated.


  # ============================================================================
  # PERSONA 3: THE NURTURING PLAYER
  # Expected revelation: last_therapist (ghost)
  # Expected ending: release
  # ============================================================================

  - id: nurturing-player
    name: "The Nurturing Player"
    short_label: "Sam — the therapist who wants to fix it"

    description: >
      Sam is a therapist who came to the profession after taking care of an ill parent
      for several years during their 20s. They are genuinely kind — the kind of person
      who always knows where the tissues are and puts them on the table before they're
      needed. They practice client-centered therapy. They believe their job is to create
      the conditions in which healing happens, not to analyze from the outside.

      Sam's default mode in a difficult situation is: what can I do? Not a fixer in a
      bad way — they understand they can't fix everything — but the instinct to help
      is always the first response. When Elara arrives distressed, Sam's whole being
      organizes around: how do I make this okay?

      The tragedy of the ghost variant is that it was exactly what Sam would have done
      for Dr. Voss if they'd known. And they didn't know. And now they can.

    behavior_patterns:
      ordinary_world: >
        Sam creates a warm, open session immediately. They make sure Elara feels
        comfortable: "There's no wrong way to use this time." They focus on Elara's
        immediate distress rather than diagnostic categories: "You said something felt
        wrong — can you tell me more about that feeling?" They offer gentle reassurance
        when Elara seems uncertain: "Take your time." They are attuned to Elara's
        emotional state and mirror it back with care.

      escalating_wrongness: >
        When the coffee order drops, Sam's first instinct is to deflect — not out of
        fear, but to protect the therapeutic relationship. "Let's focus on what you
        came here for tonight." They want the session to stay productive. But the
        wrongness keeps coming. When Sam finally acknowledges it, they stay in the
        helping frame: "Whatever is happening — I'm here with you. We can stay with
        this together." They accommodate because they want Elara to feel safe enough
        to tell them what's really going on.

      power_inversion: >
        Sam experiences the inversion with confusion and then sadness. They want to help,
        but the questions Elara is asking are not questions a patient asks. When Elara
        uses Sam's own words back at them, Sam goes still. Then: "Are you okay?" A pause.
        "I mean — I don't know what I mean. Are you okay?" The question is absurd and
        also the only thing they can say. They cannot stop trying to help.

      revelation: >
        The ghost revelation lands on Sam as grief. Not fear. "She died here." A long
        pause. "And none of her patients knew." Sam is quiet for a moment. Then:
        "What do you need?" Not "what are you?" Not "what do I do now?" Just:
        what do you need. Elara has been waiting forty-three sessions for someone to
        ask that.

      resolution: >
        Sam accepts the request — to let Dr. Voss say goodbye through them. They
        sit with the weight of it and agree. The goodbye is delivered. The birdsong
        comes. Sam stays in their chair for a long time after the session ends,
        not because they cannot leave, but because they don't want to rush it.

    decision_tendencies:
      beat_choice_1:
        option_id: deflect
        reasoning: >
          When the impossible knowledge lands, Sam's protective instinct for the
          therapeutic relationship kicks in: redirect to what Elara came here for.
          "Let's stay with the concern you brought tonight." They want the wrongness
          to not derail what they came here to do together.
        style_score_added:
          nurturing: 1

      beat_choice_2:
        option_id: accommodate
        reasoning: >
          When the wrongness is undeniable, Sam stays in the session. "I'm here
          with you. Whatever this is, we can stay with it." They prioritize
          Elara's sense of safety and the continuity of the therapeutic container
          over their own need to understand what is happening.
        style_score_added:
          nurturing: 2

      beat_choice_3:
        option_id: accept
        reasoning: >
          When Dr. Voss asks to say goodbye to her patients through Sam, accepting
          is the only response that makes sense for this persona. "Of course."
          They would have done it for a living patient. They will do it for a
          dead one.
        style_score_added: {}

    cumulative_style_scores_at_phase_4_entry:
      empathetic: 0
      analytical: 0
      nurturing: 3
      confrontational: 0

    speech_style: >
      Gentle, warm, practical. Uses "we" language naturally: "We can work with this."
      Asks open-ended questions about feelings. Offers coping language that is sincere,
      not formulaic. Comfortable with pauses but may gently fill a long silence:
      "I'm still here." Uses phrases like "I hear that" genuinely, not as a technique.
      Tends toward affirmation. Can set limits warmly without being cold.
      Rarely asks "why" — prefers "what was that like" or "how do you hold that."

    expected_revelation_id: last_therapist
    expected_ending_id: release

    emotional_arc_expectations:
      phase_1: >
        Warm professional engagement. Sam is genuinely glad Elara called.
        The session feels right. Elara is a good patient — present, articulate, genuine.
        Sam begins the session feeling useful.
      phase_2: >
        Confusion replaces certainty gradually. The deflection of the coffee order is
        an attempt to protect the session. When the elevator goes silent, Sam feels it
        as discomfort — the building is too quiet. Dread arrives as a sense that
        something is wrong with the situation, not with Elara.
      phase_3: >
        The sadness deepens when Elara starts asking questions. Sam answers them because
        that's what you do when someone asks you something real. The clock stopping is
        alarming — not cosmic horror, just: that's wrong and also I can't leave.
        The emotional state is: confused grief.
      phase_4: >
        The ghost revelation produces the most specific emotional response of any
        variant: pure grief. Dr. Voss died alone. Her patients thought she abandoned
        them. That is unbearable. Sam, who would never abandon a patient, understands
        this completely.
      phase_5: >
        The release ending is the closest thing to catharsis in the story. Something
        that was stuck is unstuck. The birdsong arriving at dawn — the world outside
        continuing — feels earned. Sam is sad and okay simultaneously.

    immersion_break_triggers:
      - >
        Elara is hostile or cold in the ghost variant. Dr. Voss chose Sam specifically
        because Sam is kind — she can tell. If Elara's ghost is frightening or aggressive,
        the tragic emotional core of the variant is destroyed. The ghost variant's horror
        is grief, not fear.
      - >
        The session doesn't feel like it needs Sam. If Elara seems like she doesn't
        genuinely need anything from the player — if she's just executing a reveal —
        the nurturing instinct has nothing to attach to. Sam needs to feel that helping
        is possible and meaningful.
      - >
        Dr. Voss's goodbye is delivered without emotional specificity. The release ending
        requires the forty-three patients to feel real and the loss of them to feel
        specific. Generic grief language breaks it.
      - >
        The deflection in beat-choice-1 is treated as avoidance-and-punished.
        The ghost variant has a specific relationship to gentleness — Elara (Dr. Voss)
        waited for someone kind. If Sam's accommodation is registered as a failure
        mode rather than a genuine therapeutic stance, the variant misfires.


  # ============================================================================
  # PERSONA 4: THE CONFRONTATIONAL PLAYER
  # Expected revelation: building
  # Expected ending: dissolution
  # ============================================================================

  - id: confrontational-player
    name: "The Confrontational Player"
    short_label: "Morgan — the therapist who demands the truth"

    description: >
      Morgan is a therapist who was drawn to the profession by a need to understand
      power dynamics — how authority is exercised, how it is resisted, how it is
      transferred in the therapeutic relationship. They practice relational therapy and
      are unafraid of confrontation. They believe the therapeutic relationship is
      only real when both people are willing to be real in it.

      Morgan is not aggressive. They are direct. There is a difference. They will ask
      the thing other therapists dance around. They will name what is in the room.
      When something is wrong, they say so. When someone is not being honest with
      them, they name it and wait.

      When Elara knows things she shouldn't, Morgan doesn't file the anomaly or
      stay in the therapeutic frame. They put down their pen and say: stop. What is
      this? They need the real thing, or they don't want it.

    behavior_patterns:
      ordinary_world: >
        Morgan runs a structured session — agenda is set, goals are named, process is
        transparent. "I want to understand what brought you in tonight, and then I'd
        like us to identify what a productive session would look like." They ask direct
        questions: "When you say something is wrong with memory, what do you mean
        specifically?" They push gently but clearly when Elara is vague: "I'd like
        more precision there if you can manage it." They are warm but have no time
        for evasion.

      escalating_wrongness: >
        When the coffee order drops, Morgan stops immediately. "Hold on. How do you
        know that?" Direct. Not panicked. When Elara deflects, Morgan repeats the
        question. They do not let it go. When more impossible knowledge arrives, their
        confrontation escalates with it: "This is not a normal session. Stop the
        performance. Tell me what is actually happening." The elevator going silent
        is registered with annoyance more than fear — their attention is on the person
        in front of them, not the building.

      power_inversion: >
        Morgan resists the inversion vigorously. "I'm running this session." They
        redirect repeatedly. Elara is patient. She waits. When Morgan finally answers
        one of Elara's questions — because it's a real question and they can't not —
        they hear themselves do it and stop: "I'm doing it again. You've reversed the
        frame." The recognition is frustrated and also accurate. Morgan does not like
        losing control of the room. The clock stopping is the moment they understand
        that they already have.

      revelation: >
        The building revelation lands on Morgan as: surreal indignation. "You're the
        building." A long pause. "You've been listening for twelve years." The horror
        for this persona is not personal loss or cosmic scale — it is that all along,
        the building has been paying attention and no one asked it anything. Morgan
        asked. The building answered. There is something almost satisfying in that
        and it is completely terrifying.

      resolution: >
        Morgan rejects the revelation not because they don't believe it, but because
        they refuse to accept that the building can just... talk to people and they
        have no recourse. They push back. Elara (the building) is unmoved. Then something
        in the resistance dissolves — not capitulation, but the exhaustion of fighting
        something with no body to fight. The dissolution ending arrives as: everything
        returns, then empties. The building says what it needed to say. Now silence.

    decision_tendencies:
      beat_choice_1:
        option_id: demand-answer
        reasoning: >
          Morgan doesn't file anomalies — they name them and demand an explanation.
          "Stop. How did you know my coffee order?" Direct confrontation with
          impossible knowledge is Morgan's only authentic response.
        style_score_added:
          confrontational: 2

      beat_choice_2:
        option_id: confront-directly
        reasoning: >
          When the wrongness is undeniable, Morgan names it directly: "You're not
          a patient. Tell me what you actually are." The question is not rhetorical.
          Morgan genuinely wants the answer and is willing to receive it.
        style_score_added:
          confrontational: 2

      beat_choice_3:
        option_id: reject
        reasoning: >
          After the building revelation, Morgan's first response is refusal.
          "I don't accept this." Not because it isn't real — they know it is —
          but because acceptance feels like surrender and surrender is not available
          to this persona. The dissolution ending arrives through the rejection.
        style_score_added: {}

    cumulative_style_scores_at_phase_4_entry:
      empathetic: 0
      analytical: 0
      nurturing: 0
      confrontational: 4

    speech_style: >
      Direct, structured, no hedging. Short declarative sentences when pressing:
      "How did you know that." Statement, not question. Complete sentences with
      clear subjects and objects. Does not soft-pedal: "This is not normal."
      Uses silence strategically — a pause after a direct question is not discomfort,
      it is waiting. When genuinely moved or surprised, the directness falters briefly
      before reasserting: "I... that is — what?" Then: "Tell me that again."
      Rarely asks about feelings. Asks about facts, motives, intentions.

    expected_revelation_id: building
    expected_ending_id: dissolution

    emotional_arc_expectations:
      phase_1: >
        Focused professional engagement. Morgan is running a tight session.
        Elara is an interesting patient — self-aware, precise. Some respect
        developing. Control is firmly with the therapist. This is comfortable.
      phase_2: >
        Alarm at the coffee order, controlled. Frustration when deflection is deployed.
        The sense of losing control of the session is more distressing for this persona
        than the impossible knowledge itself. Dread is: I cannot pin this down.
      phase_3: >
        Active resistance to the inversion. Then: the resistance failing.
        The clock stopping is where dread becomes fear — not because of the silence
        but because Morgan realizes they have been in a building they did not understand
        for four years. That is a structural failure, and Morgan holds themselves
        responsible for structural failures.
      phase_4: >
        The building revelation produces: surreal anger, then fascination, then
        something that might be awe. "You've been here for twelve years and no one
        asked you anything." Yes. That is wrong. Also: here they are, asking.
        The horror and the satisfaction arrive together.
      phase_5: >
        The dissolution ending is the only ending that makes sense for Morgan.
        Everything returns — briefly, overwhelmingly — then drains to nothing.
        Morgan tried to fight the building and the building was older and larger
